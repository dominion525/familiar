name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # gh release create
  id-token: write   # npm OIDC trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0   # gh release create --generate-notes needs full history

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          # registry-url intentionally omitted: setup-node would write a dummy NODE_AUTH_TOKEN template into .npmrc, silently bypassing OIDC trusted publishing.
          # cache intentionally omitted: release builds skip dependency cache to reduce cache-poisoning supply-chain risk.

      - name: Install dependencies
        run: npm ci
        working-directory: mcp

      - name: Build
        run: npm run build
        working-directory: mcp

      - name: Publish to npm (with provenance via OIDC)
        run: npm publish --access public --provenance
        working-directory: mcp

      - name: Build .mcpb bundle
        run: |
          npm prune --omit=dev
          npx --yes @anthropic-ai/mcpb@latest pack . familiar-mcp.mcpb
        working-directory: mcp

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" --title "$TAG" --generate-notes --verify-tag

      - name: Attach .mcpb to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release upload "$TAG" mcp/familiar-mcp.mcpb --clobber
